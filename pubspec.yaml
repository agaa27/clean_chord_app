name: clean_chord
description: "A new Flutter project."
publish_to: "none"

# 1. PERUBAHAN: Versi dinaikkan dari +2 menjadi +3 agar bisa di-upload ke Play Store
version: 1.0.0+4

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  audioplayers: ^5.2.1
  shared_preferences: ^2.3.2
  image_picker: ^1.2.2
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# 2. PERUBAHAN: Konfigurasi Ikon Adaptif Android ditambah agar ikon tidak mengecil/masuk kotak
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/iconapp.png"
  # Menggunakan warna gelap (atau silakan ganti kode HEX ini sesuai tema aplikasi Anda)
  adaptive_icon_background: "#FF0F1115"
  adaptive_icon_foreground: "assets/images/iconapp.png"
  min_sdk_android: 21

# 3. PERUBAHAN: Menambahkan konfigurasi Splash Screen agar tidak putih polos kotak di Android 12+
flutter_native_splash:
  color: "#1A1A2E" # Warna latar belakang splash screen (sesuaikan jika mau)
  image: "assets/images/iconapp.png"
  fullscreen: true
  android_12:
    color: "#1A1A2E"
    image: "assets/images/iconapp.png"

flutter:
  uses-material-design: true

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf

  assets:
    - assets/audio/Metronome.mp3
    - assets/audio/quiz_correct.mp3
    - assets/audio/quiz_fail.mp3
    - assets/audio/quiz_win.mp3
    - assets/audio/quiz_wrong.mp3
    - assets/images/Ranggas.jpeg
    - assets/images/man.jpg
    - assets/images/woman.jpg
    - assets/images/iconapp.png
